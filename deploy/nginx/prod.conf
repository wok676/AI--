# ============================================================
# TestAI 生产 Nginx 反向代理(模板,占位域名)· 上位法 CLAUDE.md §3.3 / §6
#
# 红线落地:
#   - 全站 HTTPS:80 端口除 ACME 挑战外一律 301 跳转到 443。
#   - 仅 TLS 1.2 / 1.3,关闭 TLS 1.0/1.1 与不安全套件。
#   - 后端 server 不暴露公网,nginx 反代到内网 server:3000。
#
# 部署前替换:把所有 __DOMAIN__ 改成真实域名(或用 envsubst 注入)。
# 证书路径对应 docker-compose.prod.yml 挂载的 /etc/nginx/certs。
# ============================================================

# ---- HTTP(80):仅放行 ACME 挑战,其余强制跳转 HTTPS ----
server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__;

    # 反代/编排存活探针(不走 TLS,仅供 healthcheck/负载均衡用)
    location = /healthz {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # Let's Encrypt http-01 挑战回写目录(certbot webroot 模式)
    location /.well-known/acme-challenge/ {
        root /var/www/acme-challenge;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- HTTPS(443):TLS 终止 + 反代到 server:3000 ----
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name __DOMAIN__;

    # 证书(certbot fullchain / Cloudflare origin cert);文件不入库,部署时就位
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # 仅 TLS 1.2 / 1.3(合规红线:杜绝 1.0/1.1)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_session_timeout 1d;
    ssl_session_cache shared:TestAITLS:10m;
    ssl_session_tickets off;

    # HSTS(强制浏览器后续只走 HTTPS);确认全站 HTTPS 稳定后再开 preload
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # 上传图片识别原图,放宽 body 上限(对齐 RECOGNITION_MAX_IMAGE_BYTES = 8MB)
    client_max_body_size 12m;

    # 反代到后端 API(仅内网可达)
    location /api/ {
        proxy_pass http://server:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # 健康检查直通(便于外部探活 https://__DOMAIN__/api/v1/health)
    location = /api/v1/health {
        proxy_pass http://server:3000;
        proxy_set_header Host $host;
    }
}
