name: E2E (Android · recognition)

# 识别闭环端到端测试（integration_test/recognition_smoke_test.dart）：
# 真 Android 模拟器 + 真后端 + **真实 AI 识别**（经中转站）。
#
# 为何不进每次 PR 的 CI：会真实调用 AI（有成本、有延迟波动、需密钥），
# 故仅【手动触发】或【每日定时】运行，作为发布前的闭环回归闸，而非逐 PR 门禁。
#
# 必需的仓库 Secrets（Settings → Secrets and variables → Actions）：
#   ANTHROPIC_API_KEY   —— 识别用密钥（中转站或官方）
#   ANTHROPIC_BASE_URL  —— Anthropic 兼容网关，如 https://ai.deepthink.works
#   ANTHROPIC_MODEL     —— 可选，默认 claude-opus-4-8
on:
  workflow_dispatch: {}
  schedule:
    # 每日 UTC 18:07（避开整点；约北京时间次日 02:07）。
    - cron: '7 18 * * *'

concurrency:
  group: e2e-android
  cancel-in-progress: true

jobs:
  recognition-e2e:
    name: recognition closed-loop (emulator)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testai
          POSTGRES_PASSWORD: testai
          POSTGRES_DB: testai
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U testai -d testai"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://testai:testai@localhost:5432/testai?schema=public
      JWT_ACCESS_SECRET: ci-e2e-only-secret-not-production
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
      ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL || 'claude-opus-4-8' }}
      # AI 推理 + 中转往返延迟波动大，放宽后端侧调用超时，避免有效请求被误杀。
      ANTHROPIC_TIMEOUT_MS: '60000'
    steps:
      - uses: actions/checkout@v4

      - name: Fail fast if AI secret missing
        run: |
          if [ -z "${ANTHROPIC_API_KEY}" ]; then
            echo "::error::ANTHROPIC_API_KEY secret is not set — recognition e2e cannot run."
            exit 1
          fi

      # ── 后端：装依赖 → 迁移 → 构建 → 后台启动（监听 :3000）──
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json
      - name: Build & start backend
        working-directory: server
        run: |
          npm ci
          npx prisma generate
          npx prisma migrate deploy
          npm run build
          nohup node dist/main.js > "${{ runner.temp }}/server.log" 2>&1 &
          echo "started backend pid $!"
      - name: Wait for backend health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/api/v1/health > /dev/null; then
              echo "backend healthy"; exit 0
            fi
            sleep 2
          done
          echo "::error::backend did not become healthy"; cat "${{ runner.temp }}/server.log" || true; exit 1

      # ── Flutter + Android 模拟器，跑识别闭环 ──
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: flutter pub get
        working-directory: app
        run: flutter pub get
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Run recognition integration test on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 32
          arch: x86_64
          profile: pixel_5
          # 模拟器 localhost:3000 经 adb reverse 转发到 runner 主机的后端。
          script: |
            adb reverse tcp:3000 tcp:3000
            cd app
            flutter test integration_test/recognition_smoke_test.dart \
              --dart-define=API_BASE_URL=http://localhost:3000/api

      - name: Dump backend log on failure
        if: failure()
        run: cat "${{ runner.temp }}/server.log" || true
