name: CD (server image)

# 后端镜像的持续交付:多阶段构建 server/Dockerfile → 推送 GHCR。
# - 构建本身验证 Dockerfile 可用、产出可部署工件(无需任何外部 Secret,用 GITHUB_TOKEN)。
# - 部署到生产为【手动触发】且受 SSH Secrets 保护(无服务器/密钥时不强求)。
on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - '.github/workflows/cd.yml'
  workflow_dispatch:
    inputs:
      deploy:
        description: '构建后是否 SSH 部署到生产(需 DEPLOY_* Secrets)'
        type: boolean
        default: false

concurrency:
  group: cd-server
  cancel-in-progress: false

jobs:
  # ── 构建并推送后端镜像到 GitHub Container Registry ──
  build-image:
    name: build & push server image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata (tags/labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-server
          tags: |
            type=sha
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: server
          file: server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 可选:SSH 到生产主机,用 prod compose 拉起最新栈(手动 + Secrets 保护)──
  deploy:
    name: deploy to prod (manual)
    needs: build-image
    if: github.event_name == 'workflow_dispatch' && inputs.deploy
    runs-on: ubuntu-latest
    steps:
      - name: Guard — require deploy secrets
        env:
          HOST: ${{ secrets.DEPLOY_SSH_HOST }}
        run: |
          if [ -z "${HOST}" ]; then
            echo "::error::DEPLOY_SSH_HOST/USER/KEY secrets not set — cannot deploy."
            exit 1
          fi
      - name: SSH deploy (git pull + compose up --build)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd "${{ secrets.DEPLOY_APP_DIR }}"
            git pull --ff-only
            docker compose -f deploy/docker-compose.prod.yml up -d --build
            docker compose -f deploy/docker-compose.prod.yml ps
