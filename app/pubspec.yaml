name: calorie_app
description: "AI Calorie / Diet Tracker — Flutter client (iOS + Android)."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management (Architect selection: Riverpod 2)
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.6.2

  # Networking
  dio: ^5.7.0

  # Secure storage (tokens) — never AsyncStorage/SharedPreferences for credentials
  flutter_secure_storage: ^9.2.2

  # i18n
  intl: any

  # Charts (trend view, T5/T6)
  fl_chart: ^0.69.2

  # Media & permissions (just-in-time, with pre-permission prompts)
  image_picker: ^1.1.2
  permission_handler: ^11.3.1

  # Sign in with Apple (iOS, Must)
  sign_in_with_apple: ^6.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  # On-device integration tests (QA automation base; uses TestKeys from lib/common/test_keys.dart)
  integration_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Codegen for Riverpod
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.3
  custom_lint: ^0.7.0
  riverpod_lint: ^2.6.3

  # App icon & splash generation (source PNGs produced by tools/gen_app_icon.py — pure PIL, zero bitmaps).
  # devops runs the generators (see commands below); UI does not run flutter commands.
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.3

flutter:
  uses-material-design: true
  generate: true   # enable gen-l10n (flutter_localizations)
  assets:
    - assets/icon/
    - assets/branding/

# ---------------------------------------------------------------------------
# App launcher icon (flutter_launcher_icons)
# Source images: generated by `python tools/gen_app_icon.py` (UI-DESIGN.md §0/§2.1).
# Android adaptive icon: background = brand primary #2E7D5B; foreground = transparent graphic.
# iOS / store / launcher fallback: full baked icon (icon.png, brand-green rounded gradient base).
# Run by devops:  dart run flutter_launcher_icons
# ---------------------------------------------------------------------------
flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true                 # iOS rejects alpha in AppIcon
  image_path: "assets/icon/icon.png"
  # Android 8.0+ adaptive icon (background layer + transparent foreground graphic)
  adaptive_icon_background: "#2E7D5B"    # AppColors.primary
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  min_sdk_android: 21

# ---------------------------------------------------------------------------
# Native splash screen (flutter_native_splash)
# Center logo = assets/branding/splash.png; background = page gradient top color.
# Run by devops:  dart run flutter_native_splash:create
# ---------------------------------------------------------------------------
flutter_native_splash:
  color: "#FCFDFB"                       # AppColors.gradientTop / surface (page gradient top)
  image: "assets/branding/splash.png"
  android_12:
    # Android 12+ uses a separate splash spec: brand-green background + same center logo.
    color: "#FCFDFB"
    image: "assets/branding/splash.png"
  android: true
  ios: true
  fullscreen: true
