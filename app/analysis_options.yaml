include: package:flutter_lints/flutter.yaml

analyzer:
  plugins:
    - custom_lint
  errors:
    # 严格:禁滥用 dynamic / 隐式 dynamic(对齐 TS strict 等价)
    avoid_dynamic_calls: error
  exclude:
    - lib/l10n/app_localizations*.dart # gen-l10n 生成文件

linter:
  rules:
    prefer_const_constructors: true
    prefer_final_locals: true
    avoid_print: true
    require_trailing_commas: true
