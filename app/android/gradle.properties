# Kotlin 2.3.20's Build Tools API incremental compilation corrupts its on-disk
# caches under Gradle 9.1.0 on Windows ("Could not close incremental caches ...
# is already registered"), failing plugin Kotlin compilation. Disabling Kotlin
# incremental compilation routes around the broken cache path. Build-config only;
# no functional/source change.
kotlin.incremental=false
